<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Crear Cuenta</h3>
                        
                        <form id="registerForm">
                            <div class="mb-3">
                                <label>Nuevo Usuario</label>
                                <input type="text" id="username" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Contraseña</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Registrarse</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="/login" class="text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
                        </div>
                        
                        <div id="errorMsg" class="alert alert-danger mt-3 text-center" style="display: none;"></div>
                        <div id="successMsg" class="alert alert-success mt-3 text-center" style="display: none;">
                            Usuario registrado, ingresando al login...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            fetch('/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(async response => {
                if (response.status === 409) {
                    throw new Error("El usuario ya existe.");
                }
                if (!response.ok) {
                    throw new Error("Hubo un error al registrar el usuario.");
                }
                return response.text();
            })
            .then(data => {
                successDiv.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);
            })
            .catch(error => {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            });
        });
    </script>
</body>
</html>
